<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - MIvalisweb</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { display: flex; min-height: 100vh; }
    </style>
</head>

<body>

    <nav id="admin-sidebar">
        <h2>Panel Admin</h2>
        <ul>
            <li><a href="#" class="active" onclick="admin.navigate('dashboard')">Panel</a></li>
            <li><a href="#" onclick="admin.navigate('products')">Productos</a></li>
            <li><a href="#" onclick="admin.navigate('orders')">Pedidos</a></li>
            <li><a href="index.html" style="margin-top: 2rem; border: 1px solid #333;">Volver a la Tienda</a></li>
        </ul>
    </nav>

    <main id="admin-content">
        <!-- Views Injected Here -->
    </main>

    <div id="modal-screen" class="modal">
        <div class="modal-content" id="modal-body">
            <h2 id="modal-title" style="margin-bottom: 1.5rem;">Gestionar Producto</h2>
            <form id="product-form" onsubmit="event.preventDefault(); admin.saveProduct()">
                <input type="hidden" id="p-id">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="p-name" class="input-block" required>
                    </div>
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="p-category" class="input-block">
                            <option value="Superhéroes">Superhéroes</option>
                            <option value="Terror">Terror</option>
                            <option value="De Época">De Época</option>
                            <option value="Animales">Animales</option>
                            <option value="Otros">Otros</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Precio</label>
                        <input type="number" id="p-price" step="0.01" class="input-block" required>
                    </div>
                    <div class="form-group">
                        <label>Stock</label>
                        <input type="number" id="p-stock" class="input-block" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>URL de la imagen</label>
                    <input type="text" id="p-image" class="input-block" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="p-desc" class="input-block" rows="3" placeholder="Descripción del disfraz..."></textarea>
                </div>

                <div style="text-align: right; margin-top: 1rem;">
                    <button type="button" class="btn-outline" onclick="admin.closeModal()">Cancelar</button>
                    <button type="submit" class="btn">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
