<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIvalisweb - Disfraces Premium</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <!-- Navigation -->
    <nav id="navbar">
        <div class="container nav-content">
            <div class="logo">
                <a href="#" onclick="app.navigate('home')">
                    <h1>MI<span class="text-mint">valisweb</span></h1>
                </a>
            </div>
            <button class="hamburger" onclick="app.toggleMobileMenu()" aria-label="Menú">
                <i data-lucide="menu"></i>
            </button>
            <ul id="nav-links" class="nav-links">
                <li><a href="#" onclick="app.navigate('catalog'); app.toggleMobileMenu()">Catálogo</a></li>
                <li><a href="#" onclick="app.navigate('cart'); app.toggleMobileMenu()">Carrito <span id="cart-count" class="badge">0</span></a></li>
                <li><a href="#" onclick="app.navigate('contact'); app.toggleMobileMenu()">Contacto</a></li>
                <li><a href="#" id="auth-nav-link" onclick="app.navigate('login'); app.toggleMobileMenu()">Iniciar Sesión</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-root">
        <!-- Views will be injected here by app.js -->
    </main>

    <!-- Footer -->
    <footer>
        <div class="container footer-content">
            <div class="footer-brand">
                <h3>MI<span class="text-mint">valisweb</span></h3>
                <p>Disfraces premium para cada ocasión</p>
            </div>
            <div class="footer-links">
                <a href="#" onclick="app.navigate('catalog')">Catálogo</a>
                <a href="#" onclick="app.navigate('contact')">Contacto</a>
                <a href="admin.html">Admin</a>
            </div>
            <p class="footer-copy">&copy; 2025 MIvalisweb. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
