<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Bodega Mayorista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon"><i class="fas fa-warehouse"></i></div>
                <div class="logo-text">
                    <h2>Bodega</h2>
                    <span>Mayorista</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Principal</div>
                    <a class="nav-item active" data-section="dashboard"><i
                            class="fas fa-chart-pie"></i><span>Dashboard</span></a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Gestión</div>
                    <a class="nav-item" data-section="products"><i class="fas fa-boxes"></i><span>Productos</span></a>
                    <a class="nav-item" data-section="inventory"><i
                            class="fas fa-warehouse"></i><span>Inventario</span><span class="nav-badge"
                            id="lowStockBadge">0</span></a>
                    <a class="nav-item" data-section="customers"><i class="fas fa-users"></i><span>Clientes</span></a>
                    <a class="nav-item" data-section="orders"><i
                            class="fas fa-shopping-cart"></i><span>Pedidos</span><span class="nav-badge"
                            id="pendingBadge">0</span></a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Finanzas</div>
                    <a class="nav-item" data-section="invoices"><i
                            class="fas fa-file-invoice-dollar"></i><span>Facturas</span></a>
                    <a class="nav-item" data-section="reports"><i class="fas fa-chart-bar"></i><span>Reportes</span></a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <a class="nav-item" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i><span>Cerrar
                        Sesión</span></a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="toggle-sidebar" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <h1 class="page-title" id="pageTitle">Dashboard</h1>
                </div>
                <div class="header-right">
                    <div class="header-search">
                        <input type="text" placeholder="Buscar..." id="globalSearch">
                        <i class="fas fa-search"></i>
                    </div>
                    <div class="header-actions">
                        <button class="header-btn" title="Notificaciones"><i class="fas fa-bell"></i><span class="badge"
                                id="notifBadge">3</span></button>
                    </div>
                    <div class="user-menu dropdown" id="userDropdown">
                        <div class="user-avatar" id="userAvatar">A</div>
                        <div class="user-info">
                            <div class="name" id="userName">Admin</div>
                            <div class="role">Administrador</div>
                        </div>
                        <div class="dropdown-menu">
                            <a class="dropdown-item" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i>Cerrar
                                Sesión</a>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-area" id="contentArea">
                <!-- Content loaded dynamically -->
            </div>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal"></div>
    </div>

    <script src="js/dataService.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
