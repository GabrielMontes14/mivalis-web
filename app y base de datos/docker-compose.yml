version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: tienda_db
    environment:
      POSTGRES_USER: tienda_user
      POSTGRES_PASSWORD: tienda_pass_2024
      POSTGRES_DB: tienda_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U tienda_user -d tienda_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build: .
    container_name: tienda_api
    environment:
      DATABASE_URL: postgresql+asyncpg://tienda_user:tienda_pass_2024@db:5432/tienda_db
      JWT_SECRET: ${JWT_SECRET:-bodega-mayorista-secret-key-2024}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-my_verify_token_2024}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
    volumes:
      - ./app:/app/app
      - ./frontend:/app/frontend
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
