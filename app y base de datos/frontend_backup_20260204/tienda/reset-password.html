<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Bodega Mayorista</title>
    <link rel="icon" type="image/png" href="/tienda-static/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/tienda-static/css/reset-password.css">
</head>

<body>
    <div class="reset-card">
        <div class="icon">🔐</div>
        <h1>Nueva Contraseña</h1>
        <p>Ingresa tu nueva contraseña</p>

        <div id="message" class="message"></div>

        <form id="reset-form" onsubmit="handleReset(event)">
            <div class="form-group">
                <label for="new-password">Nueva Contraseña</label>
                <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirmar Contraseña</label>
                <input type="password" id="confirm-password" placeholder="Repite tu contraseña" required minlength="6">
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">Cambiar Contraseña</button>
        </form>

        <a href="login.html" class="back-link">← Volver al inicio de sesión</a>
    </div>

    <script src="/tienda-static/js/reset-password.js" defer></script>
</body>

</html>
