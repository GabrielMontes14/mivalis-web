services:
  # Servicio Web (FastAPI)
  - type: web
    name: bodega-mayorista-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: bodega-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
      # Wompi & Email config placeholders (User must fill these in Render dashboard)
      - key: WOMPI_PUBLIC_KEY
        sync: false
      - key: WOMPI_PRIVATE_KEY
        sync: false
      - key: WOMPI_EVENT_SECRET
        sync: false
      - key: WOMPI_ENV
        value: production
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

databases:
  # Base de datos PostgreSQL
  - name: bodega-db
    region: oregon
    plan: free
    databaseName: tienda_db
    user: tienda_user
