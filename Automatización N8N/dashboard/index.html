<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oceanman — Consola de Agencia IA</title>
    <meta name="description" content="Panel de control para gestionar tu agencia de agentes de IA personalizados">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- ════════════════ MESH BACKGROUND ════════════════ -->
    <div class="mesh-bg"></div>

    <!-- ════════════════ LOGIN SCREEN ════════════════ -->
    <div id="login-screen" class="login-screen">
        <div class="login-container">
            <div class="login-glow"></div>
            <div class="login-card">
                <div class="login-logo">
                    <div class="logo-icon">
                        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                            <rect width="40" height="40" rx="10" fill="url(#grad1)" />
                            <path d="M12 28V16L20 12L28 16V28L20 32L12 28Z" stroke="white" stroke-width="2" fill="none"
                                stroke-linejoin="round" />
                            <circle cx="20" cy="22" r="3" fill="white" />
                            <defs>
                                <linearGradient id="grad1" x1="0" y1="0" x2="40" y2="40">
                                    <stop stop-color="#6366f1" />
                                    <stop offset="1" stop-color="#8b5cf6" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h1>Oceanman</h1>
                    <p class="login-subtitle">Consola de Agencia IA</p>
                </div>
                <form id="login-form" class="login-form">
                    <div class="form-group">
                        <label for="login-email">Correo electrónico</label>
                        <input type="email" id="login-email" placeholder="tu@empresa.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" placeholder="••••••••" required
                            autocomplete="current-password">
                    </div>
                    <div id="login-error" class="login-error" style="display:none;"></div>
                    <button type="submit" class="btn btn-primary btn-full" id="login-btn">
                        <span>Iniciar Sesión</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14M12 5l7 7-7 7" />
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- ════════════════ MAIN APP SHELL ════════════════ -->
    <div id="app-shell" class="app-shell" style="display:none;">

        <!-- ── SIDEBAR ── -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
                        <rect width="40" height="40" rx="10" fill="url(#grad2)" />
                        <path d="M12 28V16L20 12L28 16V28L20 32L12 28Z" stroke="white" stroke-width="2" fill="none"
                            stroke-linejoin="round" />
                        <circle cx="20" cy="22" r="3" fill="white" />
                        <defs>
                            <linearGradient id="grad2" x1="0" y1="0" x2="40" y2="40">
                                <stop stop-color="#6366f1" />
                                <stop offset="1" stop-color="#8b5cf6" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <span class="sidebar-brand">Oceanman</span>
                </div>
                <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
            </div>

            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-page="dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    <span>Centro de Mando</span>
                </a>
                <a href="#clients" class="nav-item" data-page="clients">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    <span>Clientes</span>
                </a>
                <a href="#agents" class="nav-item" data-page="agents">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                    </svg>
                    <span>Agentes</span>
                </a>
                <a href="#deploy" class="nav-item" data-page="deploy">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z" />
                        <path d="M2 17l10 5 10-5" />
                        <path d="M2 12l10 5 10-5" />
                    </svg>
                    <span>Desplegar</span>
                </a>
                <a href="#leads" class="nav-item" data-page="leads">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    <span>Leads</span>
                </a>
                <a href="#conversations" class="nav-item" data-page="conversations">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                    <span>Conversaciones</span>
                </a>
                <a href="#chat" class="nav-item" data-page="chat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l4.93-1.37A9.953 9.953 0 0 0 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z" />
                        <path d="M8 10h8M8 14h5" />
                    </svg>
                    <span>Chat de Prueba</span>
                </a>
                <a href="#settings" class="nav-item" data-page="settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    <span>Configuración</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">O</div>
                    <div class="user-details">
                        <span class="user-name" id="user-name">Oceanman</span>
                        <span class="user-plan" id="user-plan">Administrador</span>
                    </div>
                </div>
                <button id="logout-btn" class="btn-icon" title="Cerrar Sesión">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </button>
            </div>
        </aside>

        <!-- ── MOBILE OVERLAY ── -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- ── MAIN CONTENT ── -->
        <main class="main-content">
            <!-- HEADER -->
            <header class="top-bar">
                <button id="mobile-menu-btn" class="btn-icon mobile-only" aria-label="Menu">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
                <h2 class="page-title" id="page-title">Centro de Mando</h2>
                <div class="top-bar-actions">
                    <div class="infra-status" id="infra-status">
                        <span class="badge badge-activo" style="font-size:0.75rem"><span
                                class="badge-dot"></span>Sistemas OK</span>
                    </div>
                </div>
            </header>

            <!-- PAGE CONTAINER -->
            <div class="page-container" id="page-container">
                <div class="page-loading">
                    <div class="spinner"></div>
                    <p>Cargando...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- ════════════════ TOAST NOTIFICATIONS ════════════════ -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ════════════════ SCRIPTS ════════════════ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js?v=2"></script>
    <script src="js/api.js?v=2"></script>
    <script src="js/dashboard.js?v=2"></script>
    <script src="js/clients.js?v=2"></script>
    <script src="js/agents.js?v=2"></script>
    <script src="js/deploy.js?v=2"></script>
    <script src="js/leads.js?v=2"></script>
    <script src="js/conversations.js?v=2"></script>
    <script src="js/settings.js?v=2"></script>
    <script src="js/chat.js?v=1"></script>
    <script src="js/interactions.js?v=2"></script>
    <script src="js/app.js?v=2"></script>
</body>

</html>
